    default_channel: stable
    install_targets:
      - claude-code
      - codex
    worker_targets:
      - claude-code
      - codex
    requirements:
      - Claude Code or Codex entrypoint
      - Claude Code or Codex worker sessions
      - tmux
      - macOS, Linux, or Windows via WSL
    install_note: "Experimental: BMad Automator supports Claude Code and Codex entrypoints, Claude Code and Codex worker sessions, and runs on macOS, Linux, or Windows via WSL. Native Windows support coming soon."
