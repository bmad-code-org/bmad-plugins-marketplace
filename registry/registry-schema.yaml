# Registry Entry Schema
# All registry YAML files must conform to this schema.
# Fields marked (required) must be present. Fields marked (community only) apply only to community modules.

schema:
  # Module identity
  name:
    type: string
    required: true
    description: Module package name — lowercase, hyphenated

  display_name:
    type: string
    required: true
    description: Human-readable module name shown in the installer UI (e.g., "BMad Builder")

  code:
    type: string
    required: false
    description: Short module code (e.g., bmb, cis, gds) — used by the BMad installer

  description:
    type: string
    required: true
    description: One-sentence description of what the module does

  repository:
    type: string
    required: true
    description: Full GitHub repository URL

  module_definition:
    type: string
    required: false
    description: Path to module.yaml within the repo (e.g., skills/module.yaml)

  source_root:
    type: string
    required: false
    description: Path to a pure-skill payload root when a module is not module.yaml-based

  npm_package:
    type: string
    required: false
    description: npm package name if published to npm

  author:
    type: string
    required: true
    description: Author name or organization

  license:
    type: string
    required: true
    description: SPDX license identifier (e.g., MIT, Apache-2.0)

  default_selected:
    type: boolean
    required: false
    description: Whether the module is selected by default in the installer

  built_in:
    type: boolean
    required: false
    description: Whether the module is built into the core installer

  # Classification
  type:
    type: string
    required: true
    enum: [bmad-org, community, experimental]
    description: Module type — bmad-org (official/utility), community, or experimental

  category:
    type: string
    required: true
    description: Category slug from categories.yaml

  subcategory:
    type: string
    required: true
    description: Subcategory slug from categories.yaml

  keywords:
    type: array
    required: false
    description: List of keywords for search and discovery

  default_channel:
    type: string
    required: false
    enum: [stable, next]
    description: Default install channel when the installer supports channel selection

  install_targets:
    type: array
    required: false
    description: IDE or runtime entrypoints where runnable skills should be installed

  worker_targets:
    type: array
    required: false
    description: Worker runtimes supported by the module

  requirements:
    type: array
    required: false
    description: Runtime requirements or operator prerequisites for the module

  install_note:
    type: string
    required: false
    description: Installer-facing note shown when the module is selected

  # Version and trust
  version:
    type: string
    required: false
    description: Community module pinned approved version

  approved_tag:
    type: string
    required: false
    description: Community module git tag for the approved version

  approved_sha:
    type: string
    required: false
    description: Community module full commit SHA for the approved tag

  approved_date:
    type: string
    required: false
    description: Community module approval date in YYYY-MM-DD format

  reviewer:
    type: string
    required: false
    description: GitHub handle of the community module reviewer

  trust_tier:
    type: string
    required: true
    enum: [unverified, community-reviewed, bmad-certified]
    description: Current trust level

  # Promotion / Featured
  promoted:
    type: boolean
    required: false
    description: Whether this module appears in the Featured section of the community browser

  promoted_rank:
    type: integer
    required: false
    description: Sort order within Featured section (lower = higher priority)
